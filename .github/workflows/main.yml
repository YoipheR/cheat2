name: Build Mouse EXE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pynput pyinstaller

      - name: Build EXE
        run: |
          # Собираем в один файл (--onefile) 
          # Без окна консоли (--noconsole), чтобы не мешало
          pyinstaller --onefile --noconsole --name "FastMouse" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseApp
          path: dist/FastMouse.exe
